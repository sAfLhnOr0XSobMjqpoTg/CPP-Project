<svg width="600" height="350" viewBox="0 0 150 90" xmlns="http://www.w3.org/2000/svg" style="background-color: #ffffff; border: 1px solid #ccc;">

  <defs>
    <!-- Arrowhead marker definition -->
    <marker id="velArrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" />
    </marker>
    <!-- Style definitions -->
    <style>
      .particle1 { fill: #81d4fa; stroke: #0277bd; stroke-width: 0.5; }
      .particle2 { fill: #ffcc80; stroke: #ef6c00; stroke-width: 0.5; }
      .velocity-vec1 { stroke: #0277bd; stroke-width: 0.6; marker-end: url(#velArrowhead); fill: #0277bd;}
      .velocity-vec2 { stroke: #ef6c00; stroke-width: 0.6; marker-end: url(#velArrowhead); fill: #ef6c00;}
      .label-text { font-family: Arial, sans-serif; font-size: 5px; text-anchor: middle; fill: #333; dominant-baseline: central;}
      .title-text { font-family: Arial, sans-serif; font-size: 7px; text-anchor: middle; fill: #000; font-weight: bold;}
      .state-label { font-family: Arial, sans-serif; font-size: 6px; text-anchor: middle; fill: #444; font-style: italic;}
      .event-arrow { stroke: #555; stroke-width: 0.8; marker-end: url(#velArrowhead); fill: #555; }
    </style>
  </defs>

   <!-- Title -->
  <text x="75" y="10" class="title-text">Particle Collision Velocity Swap</text>

  <!-- Before Collision State -->
  <g id="before-state" transform="translate(30, 45)">
    <text x="0" y="-20" class="state-label">Before Collision</text>
    <!-- Particle 1 -->
    <circle cx="-2" cy="0" r="5" class="particle1"/>
    <text x="-2" y="0" class="label-text">P1</text>
    <text x="-8" y="-8" class="label-text" font-size="4px">Velocity</text>

    <!-- Particle 2 -->
    <circle cx="8.5" cy="0" r="5" class="particle2"/>
    <text x="8.5" y="0" class="label-text">P2</text>
    <line x1="8.5" y1="0" x2="1.5" y2="3" class="velocity-vec2" /> <!-- Example Velocity 2 -->
     <text x="10" y="6" class="label-text" font-size="4px">Velocity</text>

    <line x1="-2" y1="0" x2="8" y2="-5" class="velocity-vec1" /> <!-- Example Velocity 1 -->
  </g>

    

  <!-- Collision Event Arrow -->
  <line x1="55" y1="45" x2="95" y2="45" class="event-arrow" />
  <text x="75" y="40" class="label-text" font-size="4px">Collision Occurs</text>
  <text x="75" y="50" class="label-text" font-size="4px">(Velocities Swap)</text>


  <!-- After Collision State -->
   <g id="after-state" transform="translate(120, 45)">
    <text x="0" y="-20" class="state-label">After Collision</text>
     <!-- Particle 1 (Now has P2's original velocity) -->
    <circle cx="-2" cy="0" r="5" class="particle1"/>
    <text x="-2" y="0" class="label-text">P1</text>
    <line x1="-2" y1="0" x2="-9" y2="3" class="velocity-vec1" /> <!-- P2's Original Velocity -->
    <text x="-15" y="6" class="label-text" font-size="4px">Velocity</text>

    <!-- Particle 2 (Now has P1's original velocity) -->
    <circle cx="8.5" cy="0" r="5" class="particle2"/>
    <text x="8.5" y="0" class="label-text">P2</text>
    <line x1="8.5" y1="0" x2="18.5" y2="-5" class="velocity-vec2" /> <!-- P1's Original Velocity -->
    <text x="22" y="-8" class="label-text" font-size="4px">Velocity</text>
  </g>

</svg>